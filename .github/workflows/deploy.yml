name: CI-CD Pipeline

on:
  push:
    branches: [ main ]

jobs:

  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      # ---------------- Docker Login ----------------
      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # ---------------- Build Node Image ----------------
      - name: Build Node Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/client-a-node:${{ github.sha }} ./devops-sample-nest

      - name: Push Node Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/client-a-node:${{ github.sha }}

      # ---------------- Build Python Image ----------------
      - name: Build Python Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/client-b-python:${{ github.sha }} ./devops-sample-fast

      - name: Push Python Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/client-b-python:${{ github.sha }}

      # ---------------- Deploy to Swarm ----------------
      - name: Deploy to Swarm
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker service update \
              --image ${{ secrets.DOCKER_USERNAME }}/client-a-node:${{ github.sha }} \
              multiapp_client-a

            docker service update \
              --image ${{ secrets.DOCKER_USERNAME }}/client-b-python:${{ github.sha }} \
              multiapp_client-b

